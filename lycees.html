*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;font-family:system-ui,sans-serif;background:#0d0f14;color:#e8eaf0;}
#map{position:fixed;inset:0;z-index:0;}
#loader{position:fixed;inset:0;z-index:1000;background:#0d0f14;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .5s;}
#loader.out{opacity:0;pointer-events:none;}
.ld-icon{font-size:44px;animation:bob 1.2s ease-in-out infinite;}
.ld-title{font-size:1.2rem;font-weight:800;}
.ld-sub{color:#6b7280;font-size:.85rem;}
.prog-track{width:220px;height:4px;background:#2a2f3d;border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#ea580c,#dc2626);border-radius:2px;width:0%;transition:width .3s;}
#panel{position:fixed;top:16px;left:16px;z-index:500;width:290px;display:flex;flex-direction:column;gap:10px;pointer-events:none;}
.card{background:rgba(22,25,32,0.97);border:1px solid #2a2f3d;border-radius:14px;padding:16px 18px;box-shadow:0 8px 32px rgba(0,0,0,0.6);pointer-events:all;}
.pill{display:inline-block;background:rgba(234,88,12,0.12);border:1px solid rgba(234,88,12,0.35);border-radius:100px;padding:3px 12px;font-size:11px;font-weight:700;color:#fb923c;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
h1{font-size:1rem;font-weight:800;line-height:1.3;margin-bottom:0;}
.stats{display:flex;border:1px solid #2a2f3d;border-radius:9px;overflow:hidden;margin-top:10px;}
.stat{flex:1;padding:6px 8px;text-align:center;border-right:1px solid #2a2f3d;}
.stat:last-child{border-right:none;}
.sv{font-size:.9rem;font-weight:800;}
.sl{font-size:9px;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;}
.filters{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.filt{display:flex;align-items:center;gap:4px;cursor:pointer;font-size:.72rem;background:#1e2230;border:1px solid #2a2f3d;border-radius:100px;padding:3px 9px;transition:border-color .15s;}
.filt:hover{border-color:#ea580c;}
.filt input{width:12px;height:12px;accent-color:#ea580c;}
.sw{position:relative;margin-bottom:8px;}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#6b7280;pointer-events:none;}
input[type=text]{width:100%;background:#1e2230;border:1.5px solid #2a2f3d;border-radius:9px;color:#e8eaf0;font-size:.85rem;padding:9px 10px 9px 30px;outline:none;transition:border-color .2s,box-shadow .2s;}
input[type=text]:focus{border-color:#ea580c;box-shadow:0 0 0 3px rgba(234,88,12,0.15);}
input[type=text]::placeholder{color:#6b7280;}
.ac{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:300;background:#1e2230;border:1px solid #2a2f3d;border-radius:9px;overflow:hidden;box-shadow:0 10px 28px rgba(0,0,0,0.6);display:none;}
.ac.open{display:block;}
.aci{padding:8px 12px;cursor:pointer;font-size:.8rem;border-bottom:1px solid #2a2f3d;transition:background .1s;}
.aci:last-child{border-bottom:none;}
.aci:hover,.aci.hi{background:rgba(234,88,12,0.1);}
.am{font-weight:600;}.as{color:#6b7280;font-size:.73rem;}
.btn{width:100%;background:linear-gradient(135deg,#ea580c,#dc2626);color:#fff;border:none;border-radius:9px;padding:9px;font-size:.85rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .15s;}
.btn:hover{opacity:.88;transform:translateY(-1px);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.sb{margin-top:6px;padding:7px 10px;border-radius:8px;font-size:.78rem;display:none;align-items:center;gap:6px;}
.sb.loading{display:flex;background:rgba(234,88,12,0.08);border:1px solid rgba(234,88,12,0.25);color:#fb923c;}
.sb.error{display:block;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#fca5a5;}
.spin{width:11px;height:11px;flex-shrink:0;border:2px solid rgba(234,88,12,0.3);border-top-color:#ea580c;border-radius:50%;animation:spin .7s linear infinite;}
#rc{display:none;}#rc.on{display:block;}
.rl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fb923c;margin-bottom:4px;}
.rn{font-size:.92rem;font-weight:800;line-height:1.3;margin-bottom:6px;}
.rs{font-size:.73rem;color:#6b7280;padding:5px 8px;background:rgba(234,88,12,0.06);border:1px solid rgba(234,88,12,0.14);border-radius:7px;margin-bottom:8px;}
.rs span{color:#fb923c;font-weight:600;}
.ri{font-size:.76rem;color:#6b7280;line-height:1.7;margin-bottom:8px;}
.ri strong{color:#c8cad0;font-weight:500;}
.br{display:flex;gap:6px;flex-wrap:wrap;}
.bs{display:inline-flex;align-items:center;gap:3px;background:#1e2230;border:1px solid #2a2f3d;border-radius:7px;padding:5px 10px;color:#e8eaf0;font-size:.74rem;font-weight:500;cursor:pointer;text-decoration:none;transition:border-color .15s;white-space:nowrap;}
.bs:hover{border-color:#ea580c;}
.bs.red{border-color:rgba(239,68,68,0.3);color:#fca5a5;}
.leaflet-popup-content-wrapper{background:rgba(22,25,32,0.98)!important;border:1px solid #2a2f3d!important;border-radius:12px!important;box-shadow:0 8px 28px rgba(0,0,0,0.6)!important;color:#e8eaf0!important;font-family:system-ui,sans-serif!important;}
.leaflet-popup-tip{background:#2a2f3d!important;}
.leaflet-popup-close-button{color:#6b7280!important;top:7px!important;right:7px!important;}
.pb{padding:2px;min-width:180px;}
.pt{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#93a8ff;margin-bottom:3px;}
.pn{font-size:.9rem;font-weight:800;margin-bottom:3px;line-height:1.3;}
.pa{font-size:.76rem;color:#6b7280;line-height:1.6;margin-bottom:8px;}
.pl{display:inline-flex;align-items:center;background:#1e2230;border:1px solid #2a2f3d;border-radius:6px;padding:4px 9px;color:#e8eaf0;font-size:.73rem;font-weight:500;text-decoration:none;}
.pl:hover{border-color:#ea580c;}
#hint{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(22,25,32,0.92);border:1px solid #2a2f3d;border-radius:100px;padding:6px 14px;font-size:.73rem;color:#6b7280;white-space:nowrap;z-index:400;pointer-events:none;transition:opacity .5s;}
#hint.gone{opacity:0;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
</style>

<script>
function prog(pct,txt){document.getElementById('prog').style.width=pct+'%';document.getElementById('ldSub').textContent=txt;}
prog(20,'Lecture des lycees...');
var LYCEES=JSON.parse(document.getElementById('dataLycees').textContent);
prog(80,'Initialisation de la carte...');

var map=L.map('map',{center:[46.6,2.3],zoom:6,zoomControl:false});
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap',maxZoom:19}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

prog(85,'Placement des lycees...');
var cg=L.markerClusterGroup({
  maxClusterRadius:50,spiderfyOnMaxZoom:true,showCoverageOnHover:false,
  zoomToBoundsOnClick:true,disableClusteringAtZoom:13,
  iconCreateFunction:function(c){
    var n=c.getChildCount(),s=n<10?32:n<100?36:42;
    return L.divIcon({html:'<div style="background:rgba(234,88,12,0.9);color:#fff;border-radius:50%;width:'+s+'px;height:'+s+'px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:'+(s-20)+'px;border:2px solid rgba(255,255,255,0.5);box-shadow:0 2px 8px rgba(0,0,0,0.4);">'+n+'</div>',className:'',iconSize:[s,s],iconAnchor:[s/2,s/2]});
  }
});
var mkrs={};
LYCEES.forEach(function(l){
  if(!l.lat||!l.lon)return;
  var m=L.marker([l.lat,l.lon],{icon:ico(l.type,false)});
  m.lycee=l; m.on('click',function(){openPopup(m,l);}); cg.addLayer(m); mkrs[l.uai]=m;
});
map.addLayer(cg);
prog(100,'Pret !');
setTimeout(function(){document.getElementById('loader').classList.add('out');setTimeout(function(){document.getElementById('loader').remove();},500);},300);
setTimeout(function(){document.getElementById('hint').classList.add('gone');},5000);

// Type filter
var activeTypes={LG:true,LGT:true,LT:true,LP:true,L:true};
document.querySelectorAll('.ftype').forEach(function(cb){
  cb.addEventListener('change',function(){
    activeTypes[this.dataset.type]=this.checked;
    cg.clearLayers();
    LYCEES.forEach(function(l){
      if(!l.lat||!l.lon||!activeTypes[l.type])return;
      cg.addLayer(mkrs[l.uai]);
    });
  });
});

document.getElementById('sbtn').addEventListener('click',doSearch);
document.getElementById('btnClear').addEventListener('click',clearRes);

var TYPES={LP:'Lycee Professionnel',LGT:'Lycee General & Techno',LG:'Lycee General',LT:'Lycee Technologique',L:'Lycee'};
function ico(type,hl){
  var s=hl?20:10,bg=hl?'#f97316':(type==='LP'?'#dc2626':'#ea580c'),bd=hl?'3px solid #fff':'2px solid rgba(255,255,255,0.3)',sh=hl?'0 0 14px #f97316':'0 2px 6px rgba(0,0,0,0.4)';
  return L.divIcon({className:'',html:'<div style="width:'+s+'px;height:'+s+'px;border-radius:50%;background:'+bg+';border:'+bd+';box-shadow:'+sh+'"></div>',iconSize:[s,s],iconAnchor:[s/2,s/2]});
}
function esc(s){var d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}

function openPopup(m,l){
  var cp=String(l.cp||'').padStart(5,'0'),url='https://www.google.com/maps/search/?api=1&query='+l.lat+','+l.lon;
  var typeLabel=TYPES[l.type]||'Lycee';
  var div=document.createElement('div');div.className='pb';
  div.innerHTML='<div class="pt" style="color:#fb923c;">'+typeLabel+' &middot; Public</div>'
    +'<div class="pn">'+esc(l.nom)+'</div>'
    +'<div class="pa">'+esc(l.adresse||'')+'<br>'+cp+' '+esc(l.commune)+'</div>'
    +'<a class="pl" href="'+url+'" target="_blank" style="margin-bottom:8px;">Itineraire</a>'
    +'<div id="cbox_'+l.uai+'" style="margin-top:8px;padding-top:6px;border-top:1px solid #2a2f3d;"></div>'    +'<div id="fbox_'+l.uai+'" style="margin-top:8px;padding-top:8px;border-top:1px solid #2a2f3d;">'
      +'<div style="font-size:10px;color:#93a8ff;display:flex;align-items:center;gap:5px;">'
        +'<div style="width:9px;height:9px;border:2px solid rgba(79,110,247,0.3);border-top-color:#4f6ef7;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;"></div>'
        +'Chargement des formations...'
      +'</div>'
    +'</div>';
  m.bindPopup(div,{maxWidth:280}).openPopup();
  fetchContacts(l.uai);
  fetchFormations(l.uai);
}


// ---- Contacts lycées (data/contacts-lycees.json) ----
var _lycContacts = null;
function loadLycContacts(cb) {
  if (_lycContacts) { cb(); return; }
  fetch('data/contacts-lycees.json')
    .then(function(r){ return r.json(); })
    .then(function(d){ _lycContacts = d; cb(); })
    .catch(function(){ _lycContacts = {}; cb(); });
}
function fetchContacts(uai) {
  loadLycContacts(function() { renderContacts(uai); });
}
function renderContacts(uai) {
  var box = document.getElementById('cbox_'+uai); if (!box) return;
  var c   = _lycContacts[uai];
  var tel  = c ? (c.t || c.tel || '') : '';
  var mail = c ? (c.m || c.mail || '') : '';
  var web  = c ? (c.w || c.web || '') : '';
  tel  = String(tel).trim();
  mail = String(mail).trim();
  web  = String(web).trim();
  if (!tel && !mail && !web) { box.style.display='none'; return; }
  var html = '';
  if (tel)  html += '<div style="font-size:.78rem;margin-bottom:5px;display:flex;align-items:center;gap:7px;">'    +'<span style="font-size:13px;">📞</span>'    +'<a href="tel:'+tel.replace(/\s/g,'')+'" style="color:#93a8ff;text-decoration:none;font-weight:500;">'+esc(tel)+'</a></div>';
  if (mail) html += '<div style="font-size:.78rem;margin-bottom:5px;display:flex;align-items:center;gap:7px;">'    +'<span style="font-size:13px;">✉️</span>'    +'<a href="mailto:'+esc(mail)+'" style="color:#93a8ff;text-decoration:none;font-weight:500;">'+esc(mail)+'</a></div>';
  if (web)  html += '<div style="font-size:.78rem;display:flex;align-items:center;gap:7px;">'    +'<span style="font-size:13px;">🌐</span>'    +'<a href="'+esc(web)+'" target="_blank" style="color:#93a8ff;text-decoration:none;font-weight:500;">Site web</a></div>';
  box.innerHTML = html;
}
function fetchFormations(uai){
  var url='https://api.onisep.fr/api/1.0/dataset/fr-onisep-les-formations-en-lycee-et-post-bac-par-etablissement?filters=code_uai%3D%3D'+uai+'&itemsPerPage=50';
  fetch(url).then(function(r){return r.json();})
    .then(function(d){renderFormations(uai,d.data||d.results||d.collection||[]);})
    .catch(function(){renderFallback(uai);});
}
function renderFormations(uai,items){
  var box=document.getElementById('fbox_'+uai);if(!box)return;
  if(!items||!items.length){renderFallback(uai);return;}
  var html='<div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#fb923c;margin-bottom:5px;">Formations ('+items.length+')</div>';
  items.slice(0,12).forEach(function(item){
    var nom=item.libelle_formation_principal||item.libelle||item.nom_formation||item.intitule||'';
    var niv=item.niveau||item.niveau_de_qualification||'';
    if(!nom)return;
    html+='<div style="padding:4px 0;border-bottom:1px solid #1e2230;font-size:.72rem;line-height:1.4;">'
      +'<div style="font-weight:500;color:#e8eaf0;">'+esc(String(nom))+'</div>'
      +(niv?'<div style="color:#6b7280;font-size:.68rem;">'+esc(String(niv))+'</div>':'')
    +'</div>';
  });
  if(items.length>12)html+='<div style="font-size:.7rem;color:#6b7280;padding-top:3px;">+' +(items.length-12)+' autres</div>';
  box.innerHTML=html;
}
function renderFallback(uai){
  var box=document.getElementById('fbox_'+uai);if(!box)return;
  box.innerHTML='<div style="font-size:.72rem;color:#6b7280;">Formations non disponibles. <a href="https://www.onisep.fr/" target="_blank" style="color:#93a8ff;">Voir Onisep.fr</a></div>';
}

// ─── Recherche ───
var inp=document.getElementById('addr'),acEl=document.getElementById('ac'),acT,sugg=[],ai=-1;
var hlD,hlLyst=null;
inp.addEventListener('input',function(){clearTimeout(acT);var q=inp.value.trim();if(q.length<4){hideAC();return;}acT=setTimeout(function(){fetchAC(q);},280);});
inp.addEventListener('keydown',function(e){
  var its=acEl.querySelectorAll('.aci');
  if(e.key==='ArrowDown'){ai=Math.min(ai+1,its.length-1);updAC(its);e.preventDefault();}
  else if(e.key==='ArrowUp'){ai=Math.max(ai-1,-1);updAC(its);e.preventDefault();}
  else if(e.key==='Enter'){if(ai>=0&&its[ai])its[ai].click();else doSearch();e.preventDefault();}
  else if(e.key==='Escape')hideAC();
});
document.addEventListener('click',function(e){if(!e.target.closest('#sw'))hideAC();});
function updAC(its){its.forEach(function(it,i){it.classList.toggle('hi',i===ai);});if(ai>=0&&sugg[ai])inp.value=sugg[ai].properties.label;}
function fetchAC(q){
  fetch('https://api-adresse.data.gouv.fr/search/?q='+encodeURIComponent(q)+'&limit=5&type=housenumber')
    .then(function(r){return r.json();}).then(function(d){sugg=d.features;renderAC();}).catch(function(){});
}
function renderAC(){
  if(!sugg.length){hideAC();return;}ai=-1;acEl.innerHTML='';
  sugg.forEach(function(f,i){
    var p=f.properties,div=document.createElement('div');div.className='aci';
    div.innerHTML='<div class="am">'+esc(p.name||p.label)+'</div><div class="as">'+esc(p.postcode||'')+' '+esc(p.city||'')+'</div>';
    div.addEventListener('click',function(){inp.value=f.properties.label;hideAC();fromFeat(f);});
    acEl.appendChild(div);
  });
  acEl.classList.add('open');
}
function hideAC(){acEl.classList.remove('open');}
function doSearch(){
  var q=inp.value.trim();if(!q)return;hideAC();setSt('loading','Geocodage...');
  fetch('https://api-adresse.data.gouv.fr/search/?q='+encodeURIComponent(q)+'&limit=1')
    .then(function(r){return r.json();})
    .then(function(d){if(!d.features||!d.features.length){setSt('error','Adresse introuvable.');return;}fromFeat(d.features[0]);})
    .catch(function(){setSt('error','Verifiez votre connexion.');});
}
function fromFeat(feat){
  var p=feat.properties,lat=feat.geometry.coordinates[1],lng=feat.geometry.coordinates[0];
  var insee=p.citycode,dept=insee.startsWith('97')?insee.slice(0,3):insee.slice(0,2).replace(/^0/,'')||'0';
  setSt('loading','Recherche des lycees du departement '+dept+'...');
  if(hlD){map.removeLayer(hlD);hlD=null;}
  hlD=L.circleMarker([lat,lng],{radius:7,color:'#f59e0b',fillColor:'#f59e0b',fillOpacity:.9,weight:2}).addTo(map).bindTooltip('Votre adresse');
  var lycs=LYCEES.filter(function(l){return l.dept===dept;});
  clrSt();
  document.getElementById('rn').textContent=lycs.length+' lycees publics — Dept '+dept;
  document.getElementById('rs').innerHTML='Adresse : <span>'+esc(p.label)+'</span>';
  document.getElementById('ri').innerHTML='<strong>Lycees GT :</strong> libre choix dans le departement<br><strong>Lycees Pro :</strong> libre choix national (Affelnet)';
  document.getElementById('rc').classList.add('on');
  if(lycs.length){
    var lats=lycs.map(function(l){return l.lat;}),lons=lycs.map(function(l){return l.lon;});
    map.fitBounds(L.latLngBounds([Math.min.apply(null,lats),Math.min.apply(null,lons)],[Math.max.apply(null,lats),Math.max.apply(null,lons)]).pad(0.1),{animate:true,duration:1});
  }
  showDeptPanel(dept,lycs);
}
function showDeptPanel(dept,lycs){
  var old=document.getElementById('deptPanel');if(old)old.remove();
  lycs.sort(function(a,b){if(a.type!==b.type)return a.type.localeCompare(b.type);return a.nom.localeCompare(b.nom,'fr');});
  var byType={};lycs.forEach(function(l){if(!byType[l.type])byType[l.type]=[];byType[l.type].push(l);});
  var tlabels={LG:'Lycees Generaux',LGT:'Lycee General & Techno',LT:'Lycees Technologiques',LP:'Lycees Professionnels',L:'Lycees'};
  var listHTML='';
  Object.keys(byType).sort().forEach(function(type){
    listHTML+='<div style="padding:5px 12px 3px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#fb923c;border-bottom:1px solid #2a2f3d;">'+(tlabels[type]||type)+' ('+byType[type].length+')</div>';
    byType[type].forEach(function(l){
      listHTML+='<div class="ly-it" data-uai="'+l.uai+'" style="padding:6px 12px;border-bottom:1px solid #1e2230;cursor:pointer;font-size:.75rem;line-height:1.3;">'
        +'<div style="font-weight:600;color:#e8eaf0;">'+esc(l.nom)+'</div>'
        +'<div style="color:#6b7280;font-size:.7rem;">'+esc(l.commune)+' ('+l.cp+')</div>'
      +'</div>';
    });
  });
  var panel=document.createElement('div');panel.id='deptPanel';
  panel.style.cssText='position:fixed;top:16px;right:16px;z-index:600;width:260px;max-height:calc(100vh - 32px);display:flex;flex-direction:column;pointer-events:all;';
  panel.innerHTML='<div style="background:rgba(22,25,32,0.97);border:1px solid #2a2f3d;border-radius:14px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.5);display:flex;flex-direction:column;max-height:calc(100vh - 32px);">'
    +'<div style="padding:12px 14px;border-bottom:1px solid #2a2f3d;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">'
      +'<div><div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fb923c;margin-bottom:2px;">Dept '+dept+'</div>'
      +'<div style="font-size:.82rem;font-weight:800;">'+lycs.length+' lycees publics</div></div>'
      +'<button id="closeDept" style="background:none;border:1px solid #2a2f3d;border-radius:6px;padding:3px 8px;color:#6b7280;font-size:.72rem;cursor:pointer;">&#10005;</button>'
    +'</div>'
    +'<div style="overflow-y:auto;flex:1;">'+listHTML+'</div></div>';
  document.body.appendChild(panel);
  document.getElementById('closeDept').addEventListener('click',function(){panel.remove();});
  panel.querySelectorAll('.ly-it').forEach(function(el){
    el.addEventListener('mouseenter',function(){this.style.background='rgba(234,88,12,0.08)';});
    el.addEventListener('mouseleave',function(){this.style.background='';});
    el.addEventListener('click',function(){
      var uai=this.dataset.uai,m=mkrs[uai],l=LYCEES.find(function(x){return x.uai===uai;});
      if(!m||!l)return;
      cg.zoomToShowLayer(m,function(){openPopup(m,l);});
    });
  });
}
function clearRes(){
  document.getElementById('rc').classList.remove('on');
  if(hlD){map.removeLayer(hlD);hlD=null;}
  var p=document.getElementById('deptPanel');if(p)p.remove();
  map.setView([46.6,2.3],6,{animate:true});
}
function setSt(type,msg){
  var el=document.getElementById('sb');el.className='sb '+type;
  document.getElementById('stxt').textContent=msg;
  el.style.display=type==='loading'?'flex':'block';
  document.getElementById('sbtn').disabled=type==='loading';
}
function clrSt(){document.getElementById('sb').style.display='none';document.getElementById('sbtn').disabled=false;}
</script>
