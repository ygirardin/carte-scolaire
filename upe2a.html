<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carte — UPE2A · Collèges publics France</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <style>
    :root {
      --accent: #0694a2;        /* ← change per page */
      --accent-light: #ecfeff;
      --accent-dark: #0e7490;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --panel-w: 340px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    /* ── Layout ── */
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      height: 52px;
      flex-shrink: 0;
      z-index: 1000;
    }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: .8rem; font-weight: 600;
      color: var(--gray-500);
      text-decoration: none;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--gray-200);
      transition: background .15s;
    }
    .back-btn:hover { background: var(--gray-100); color: var(--gray-900); }

    .header-title {
      display: flex; align-items: center; gap: 8px;
      font-size: .95rem; font-weight: 700;
    }
    .badge {
      background: var(--accent);
      color: #fff;
      font-size: .65rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
      letter-spacing: .04em;
    }

    .header-right {
      margin-left: auto;
      display: flex; align-items: center; gap: 8px;
    }

    /* ── Content area ── */
    .content { display: flex; flex: 1; overflow: hidden; }

    /* ── Map ── */
    #map { flex: 1; }

    /* ── Side panel ── */
    .panel {
      width: var(--panel-w);
      background: #fff;
      border-left: 1px solid var(--gray-200);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .panel-header {
      padding: 16px;
      border-bottom: 1px solid var(--gray-200);
    }
    .panel-header h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    /* Search */
    .search-wrap {
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 8px 12px 8px 34px;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      font-size: .85rem;
      outline: none;
      transition: border-color .2s;
      background: var(--gray-50);
    }
    .search-input:focus { border-color: var(--accent); background: #fff; }
    .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      font-size: .85rem; pointer-events: none; opacity: .5;
    }

    /* Dept filter */
    .dept-select {
      width: 100%;
      margin-top: 8px;
      padding: 7px 10px;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      font-size: .82rem;
      background: var(--gray-50);
      cursor: pointer;
      outline: none;
    }
    .dept-select:focus { border-color: var(--accent); }

    /* Count bar */
    .count-bar {
      padding: 10px 16px;
      background: var(--accent-light);
      border-bottom: 1px solid var(--gray-200);
      font-size: .78rem;
      color: var(--accent-dark);
      font-weight: 600;
    }

    /* List */
    .etab-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .etab-item {
      padding: 10px 16px;
      border-bottom: 1px solid var(--gray-100);
      cursor: pointer;
      transition: background .12s;
    }
    .etab-item:hover { background: var(--gray-50); }
    .etab-item.active { background: var(--accent-light); border-left: 3px solid var(--accent); }
    .etab-name {
      font-size: .85rem;
      font-weight: 600;
      color: var(--gray-900);
      margin-bottom: 2px;
    }
    .etab-loc {
      font-size: .75rem;
      color: var(--gray-500);
    }

    /* Empty state */
    .empty-state {
      padding: 32px 16px;
      text-align: center;
      color: var(--gray-500);
      font-size: .85rem;
    }

    /* Popup */
    .popup-inner { min-width: 200px; }
    .popup-title { font-weight: 700; font-size: .9rem; margin-bottom: 6px; }
    .popup-badge {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: .65rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .popup-info { font-size: .8rem; color: #555; line-height: 1.5; }

    /* Loading overlay */
    #loading {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 12px;
      font-size: .9rem;
      color: var(--gray-700);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Mobile */
    @media (max-width: 700px) {
      .panel { display: none; }
    }
  </style>
</head>
<body>

<header>
  <a class="back-btn" href="index.html">← Accueil</a>
  <div class="header-title">
    <span>🌍</span>
    <span>Collèges avec UPE2A</span>
    <span class="badge">UPE2A</span>
  </div>
  <div class="header-right">
    <span id="header-count" style="font-size:.8rem;color:var(--gray-500)">Chargement…</span>
  </div>
</header>

<div class="content">
  <div id="map">
    <div id="loading">
      <div class="spinner"></div>
      <span>Chargement des établissements…</span>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <h2>🌍 Collèges avec UPE2A</h2>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="search" class="search-input" type="text" placeholder="Nom ou ville…" />
      </div>
      <select id="dept-filter" class="dept-select">
        <option value="">Tous les départements</option>
      </select>
    </div>
    <div class="count-bar" id="count-label">— établissements</div>
    <div class="etab-list" id="etab-list"></div>
  </div>
</div>

<script>
// ── Configuration (adapter par page) ──────────────────────────────
const CONFIG = {
  field:    'upe2a',        // champ API à filtrer
  value:    '1',            // valeur attendue (1 = OUI dans cet API)
  label:    'UPE2A',
  color:    '#0694a2',
  accentLight: '#ecfeff',
};

// ── Initialisation Leaflet ────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([46.6, 2.3], 6);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap · © CARTO',
  maxZoom: 18,
}).addTo(map);

// Cluster-like marker group
const markerGroup = L.layerGroup().addTo(map);

// ── Données ──────────────────────────────────────────────────────
const API_BASE = 'https://data.education.gouv.fr/api/explore/v2.1/catalog/datasets/fr-en-annuaire-education/records';

let allData = [];
let markers = {}; // uai → marker

async function fetchAll() {
  const pageSize = 100;
  let offset = 0;
  let total = null;
  const results = [];

  while (true) {
    const params = new URLSearchParams({
      where: `type_etablissement="Collège" AND ${CONFIG.field}="1"`,
      select: 'nom_etablissement,adresse_1,code_postal,nom_commune,latitude,longitude,numero_uai,code_departement',
      limit: pageSize,
      offset: offset,
    });

    const res = await fetch(`${API_BASE}?${params}`);
    if (!res.ok) throw new Error('API error ' + res.status);
    const json = await res.json();

    if (total === null) total = json.total_count;
    results.push(...json.results);
    offset += pageSize;

    if (results.length >= total || json.results.length === 0) break;
    // Safety cap: 5000 records max
    if (results.length >= 5000) break;
  }

  return results;
}

function createMarker(etab) {
  const lat = parseFloat(etab.latitude);
  const lng = parseFloat(etab.longitude);
  if (!lat || !lng) return null;

  const icon = L.divIcon({
    className: '',
    html: `<div style="
      width:10px;height:10px;
      border-radius:50%;
      background:${CONFIG.color};
      border:2px solid #fff;
      box-shadow:0 1px 4px rgba(0,0,0,.3);
    "></div>`,
    iconSize: [10, 10],
    iconAnchor: [5, 5],
  });

  const marker = L.marker([lat, lng], { icon });
  marker.bindPopup(`
    <div class="popup-inner">
      <div class="popup-title">${etab.nom_etablissement}</div>
      <span class="popup-badge">${CONFIG.label}</span>
      <div class="popup-info">
        ${etab.adresse_1 ? etab.adresse_1 + '<br>' : ''}
        ${etab.code_postal} ${etab.nom_commune}
      </div>
    </div>
  `, { maxWidth: 260 });

  return marker;
}

// ── Rendu de la liste ─────────────────────────────────────────────
function renderList(data) {
  const list = document.getElementById('etab-list');
  document.getElementById('count-label').textContent =
    `${data.length} établissement${data.length > 1 ? 's' : ''}`;

  if (data.length === 0) {
    list.innerHTML = '<div class="empty-state">Aucun établissement trouvé.</div>';
    return;
  }

  list.innerHTML = data.map(e => `
    <div class="etab-item" data-uai="${e.numero_uai}">
      <div class="etab-name">${e.nom_etablissement}</div>
      <div class="etab-loc">${e.code_postal} ${e.nom_commune}</div>
    </div>
  `).join('');

  list.querySelectorAll('.etab-item').forEach(el => {
    el.addEventListener('click', () => {
      const uai = el.dataset.uai;
      const m = markers[uai];
      if (m) {
        map.flyTo(m.getLatLng(), 14, { animate: true, duration: .8 });
        m.openPopup();
      }
      list.querySelectorAll('.etab-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
    });
  });
}

// ── Filtres ───────────────────────────────────────────────────────
function getFiltered() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const dept = document.getElementById('dept-filter').value;
  return allData.filter(e => {
    const matchSearch = !q ||
      e.nom_etablissement.toLowerCase().includes(q) ||
      e.nom_commune.toLowerCase().includes(q);
    const matchDept = !dept || e.code_departement === dept;
    return matchSearch && matchDept;
  });
}

function applyFilters() {
  const filtered = getFiltered();
  markerGroup.clearLayers();
  markers = {};
  filtered.forEach(e => {
    const m = createMarker(e);
    if (m) {
      markerGroup.addLayer(m);
      markers[e.numero_uai] = m;
    }
  });
  renderList(filtered);
}

// ── Initialisation ────────────────────────────────────────────────
(async () => {
  try {
    allData = await fetchAll();

    // Populate dept filter
    const depts = [...new Set(allData.map(e => e.code_departement).filter(Boolean))].sort();
    const sel = document.getElementById('dept-filter');
    depts.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d;
      opt.textContent = `Département ${d}`;
      sel.appendChild(opt);
    });

    document.getElementById('header-count').textContent =
      `${allData.length} collèges`;

    applyFilters();

    document.getElementById('search').addEventListener('input', applyFilters);
    document.getElementById('dept-filter').addEventListener('change', applyFilters);

  } catch (err) {
    console.error(err);
    document.getElementById('loading').innerHTML =
      `<span style="color:#e02424">Erreur de chargement. Vérifiez votre connexion.</span>`;
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
})();
</script>
</body>
</html>
